services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: ethno
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev"]
      interval: 3s
      timeout: 3s
      retries: 3

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on:
      - db
    environment:
      ADMINER_DEFAULT_SERVER: db

  project:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ethno-backend
    ports:
      - "8080:8080"
    environment:
      - ENV=prod

      - DB_USER=dev
      - DB_PASSWORD=12345
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=ethno

      - HTTP_HOST=0.0.0.0
      - HTTP_PORT=8080

      - JWT_SECRET=change-me-in-prod-please
      - JWT_EXPIRY_HOURS=24

      - MIGRATIONS_PATH=file://migrations

      - COOKIE_DOMAIN=localhost
      - COOKIE_SECURE=false

    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./frontend:/app/frontend:ro
      - ./backend/migrations:/app/migrations:ro

volumes:
  pgdata:
