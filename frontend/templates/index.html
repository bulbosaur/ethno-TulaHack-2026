<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ethno</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="/static/css/index.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>ЭТНО</h1>
          <p class="sidebar-subtitle">Возрождение ремёсел</p>
        </div>

        <nav class="sidebar-nav">
          <a href="/login" class="sidebar-link">Войти</a>
          <a href="/register" class="sidebar-link">Зарегистрироваться</a>
        </nav>

        <div class="sidebar-footer">
          <p class="copyright">© 2026 Ethno Project</p>
        </div>
      </aside>

      <main class="main-content">
        <div class="content-wrapper">
          <header class="page-header">
            <h2>Исследуйте культуру, играя</h2>
            <p class="header-desc">
              Проект <b>Этно</b> поможет вам открыть для себя традиции и ремесла
              народов России. Скорее приступайте!
            </p>
          </header>

          <div id="map"></div>

          <section class="quests-section">
            <h3>Доступные квесты</h3>
            <div id="quests-grid" class="quests-grid">
              <div class="quest-card loading">Загрузка квестов...</div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <div id="info-panel">
      <button class="close-btn" id="close-panel" aria-label="Закрыть">
        &times;
      </button>
      <h2 id="region-name"></h2>
      <p id="region-info"></p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/js/index.js"></script>
  </body>
</html>
