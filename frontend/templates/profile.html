<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Личный кабинет | Ethno</title>
    <link rel="stylesheet" href="/static/css/index.css" />
    <link rel="stylesheet" href="/static/css/profile.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>ЭТНО</h1>
          <p class="sidebar-subtitle">Возрождение ремёсел</p>
        </div>

        <nav class="sidebar-nav">
          <a href="/" class="sidebar-link">На главную</a>
          <button
            id="logout-btn"
            class="sidebar-link"
            style="
              background: none;
              border: none;
              cursor: pointer;
              text-align: left;
              width: 100%;
              font: inherit;
              color: var(--text);
              padding: 12px 16px;
              border-radius: 8px;
            "
          >
            Выйти
          </button>
        </nav>

        <div class="sidebar-footer">
          <p class="copyright">© 2026 Ethno Project</p>
        </div>
      </aside>

      <main class="main-content">
        <div class="content-wrapper">
          <header class="page-header">
            <h2>Личный кабинет</h2>
            <p class="header-desc">
              Привет, <b id="user-name">Загрузка...</b>! Здесь вы найдёте
              рекомендованные квесты и управление профилем.
            </p>
          </header>

          <section class="quests-section">
            <h3>Рекомендованные квесты</h3>
            <div id="quests-grid" class="quests-grid">
              <div class="quest-card loading">Загрузка рекомендаций...</div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script src="/static/js/profile.js"></script>
  </body>
</html>
